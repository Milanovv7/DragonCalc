
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" type="image/png" href="IMG_5375.PNG" sizes="any">
    
    <style>
        /* --- COLOR VARIABLES --- */
        :root {
            --bg-color: #001233;
            --sidebar-bg: rgba(0, 18, 51, 0.6);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --hover-bg: rgba(255, 255, 255, 0.1);
            --accent: #005a9e;
            --input-bg: #111;
            --menu-span-bg: #ffffff;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f3f3f3;
                --sidebar-bg: rgba(255, 255, 255, 0.7);
                --btn-bg: rgba(0, 0, 0, 0.03);
                --btn-border: rgba(0, 0, 0, 0.1);
                --text-color: #1a1a1a;
                --hover-bg: rgba(0, 0, 0, 0.05);
                --accent: #0078d4;
                --input-bg: #ffffff;
                --menu-span-bg: #333333;
            }
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* --- HAMBURGER MENU --- */
        .menu-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 100;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .menu-btn:hover { background: var(--hover-bg); }
        
        .menu-btn span { 
            width: 20px; 
            height: 2px; 
            background: var(--menu-span-bg); 
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* Hover Animation */
        .menu-btn:hover span { width: 14px; }

        /* ACTIVE/CLICK Animation: Reset to full width on click */
        .menu-btn:active span { width: 20px; transition: width 0.05s; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: absolute;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            display: flex;
            flex-direction: column;
            padding-top: 65px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar.open { left: 0; }
        .sidebar-title { padding: 10px 24px; font-weight: 600; font-size: 20px; margin-bottom: 5px; }
        .sidebar-item { padding: 12px 24px; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .sidebar-item:hover { background: var(--hover-bg); }
        .sidebar-sep { height: 1px; background: var(--btn-border); margin: 10px 24px; }

        /* --- MAIN APP --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-top: 60px;
            width: 100%;
            height: 100%;
        }

        .display-container {
            flex-shrink: 0;
            text-align: right;
            padding: 10px 0;
            margin-bottom: 10px;
        }
        #history { font-size: 18px; opacity: 0.6; min-height: 24px; }
        #display { font-size: 72px; font-weight: 300; margin: 0; overflow: hidden; }
        #bin-preview { font-size: 14px; opacity: 0.4; font-family: monospace; height: 18px; margin-top: 5px; }

        .mode-container { display: none; flex: 1; flex-direction: column; }
        .mode-container.active { display: flex; }

        .sci-row { 
            display: none; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 4px; 
            margin-bottom: 4px; 
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px;
            flex: 1;
        }

        .reveal-btn {
            position: relative;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            color: var(--text-color);
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: background 0.15s;
        }
        
        .reveal-btn::before {
            content: '';
            position: absolute;
            top: var(--y, -100px);
            left: var(--x, -100px);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .reveal-btn:hover::before { opacity: 1; }

        @media (prefers-color-scheme: light) {
            .reveal-btn::before { background: radial-gradient(circle, rgba(0,0,0,0.06) 0%, transparent 70%); }
        }

        .op-btn { background: var(--btn-bg); font-weight: 400; }
        .eq-btn { background: var(--accent); border: none; color: white !important; }

        /* --- DATE MODE --- */
        #mode-date.active { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        .date-input-group { margin-bottom: 25px; width: 100%; }
        input[type="date"] { 
            width: 280px; 
            padding: 12px; 
            background: var(--input-bg); 
            color: var(--text-color); 
            border: 1px solid var(--btn-border); 
            border-radius: 4px; 
            font-family: inherit; 
            margin-top: 8px;
        }
        #dateResult { font-size: 28px; font-weight: 300; margin: 20px 0; }
        .reset-date-btn { 
            padding: 10px 25px; 
            background: var(--btn-bg); 
            border: 1px solid var(--btn-border); 
            color: var(--text-color); 
            border-radius: 4px; 
            cursor: pointer; 
        }

    </style>
</head>
<body onclick="closeSidebar()">

    <div class="menu-btn" id="menuBtn" onclick="event.stopPropagation(); toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div class="sidebar" id="sidebar" onclick="event.stopPropagation()">
        <div class="sidebar-title">Calculator</div>
        <div class="sidebar-item" onclick="changeMode('standard')">Standard</div>
        <div class="sidebar-item" onclick="changeMode('scientific')">Scientific</div>
        <div class="sidebar-item" onclick="changeMode('programmer')">Programmer</div>
        <div class="sidebar-item" onclick="changeMode('date')">Date Calculation</div>
        <div class="sidebar-sep"></div>
        <div class="sidebar-item" onclick="alert('DragonCalc v1.0 Built for DragonOS 2026.')">About Calculator</div>
    </div>

    <div class="main-content">
        <div id="mode-main" class="mode-container active">
            <div class="display-container">
                <div id="history"></div>
                <div id="display">0</div>
                <div id="bin-preview" style="display: none;"></div>
            </div>

            <div id="sci-btns" class="sci-row">
                <div class="reveal-btn op-btn" onclick="sciOp('sin')">sin</div>
                <div class="reveal-btn op-btn" onclick="sciOp('cos')">cos</div>
                <div class="reveal-btn op-btn" onclick="sciOp('tan')">tan</div>
                <div class="reveal-btn op-btn" onclick="sciOp('sqrt')">√</div>
            </div>

            <div class="calc-grid">
                <div class="reveal-btn op-btn" onclick="clearCalc()">C</div>
                <div class="reveal-btn op-btn" onclick="backspace()">⌫</div>
                <div class="reveal-btn op-btn" onclick="setOp('%')">%</div>
                <div class="reveal-btn op-btn" onclick="setOp('/')">÷</div>

                <div class="reveal-btn" onclick="inputNum('7')">7</div>
                <div class="reveal-btn" onclick="inputNum('8')">8</div>
                <div class="reveal-btn" onclick="inputNum('9')">9</div>
                <div class="reveal-btn op-btn" onclick="setOp('*')">×</div>

                <div class="reveal-btn" onclick="inputNum('4')">4</div>
                <div class="reveal-btn" onclick="inputNum('5')">5</div>
                <div class="reveal-btn" onclick="inputNum('6')">6</div>
                <div class="reveal-btn op-btn" onclick="setOp('-')">-</div>

                <div class="reveal-btn" onclick="inputNum('1')">1</div>
                <div class="reveal-btn" onclick="inputNum('2')">2</div>
                <div class="reveal-btn" onclick="inputNum('3')">3</div>
                <div class="reveal-btn op-btn" onclick="setOp('+')">+</div>

                <div class="reveal-btn" onclick="toggleNeg()">±</div>
                <div class="reveal-btn" onclick="inputNum('0')">0</div>
                <div class="reveal-btn" onclick="inputNum('.')">.</div>
                <div class="reveal-btn eq-btn" onclick="calculate()">=</div>
            </div>
        </div>

        <div id="mode-date" class="mode-container">
            <h2 style="font-weight: 400; margin-bottom: 30px;">Date Calculation</h2>
            <div class="date-input-group">
                <label style="font-size: 14px; opacity: 0.7;">From</label><br>
                <input type="date" id="d1" onchange="calcDateDiff()">
            </div>
            <div class="date-input-group">
                <label style="font-size: 14px; opacity: 0.7;">To</label><br>
                <input type="date" id="d2" onchange="calcDateDiff()">
            </div>
            <div id="dateResult">Select two dates</div>
            <button class="reset-date-btn" onclick="resetDates()">Reset Dates</button>
        </div>
    </div>

    <script>
        let current = '0', previous = '', operator = null, shouldReset = false, activeMode = 'standard';
        const display = document.getElementById('display'), historyTxt = document.getElementById('history'), binView = document.getElementById('bin-preview');

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

        function changeMode(m) {
            activeMode = m;
            document.getElementById('mode-main').classList.toggle('active', m !== 'date');
            document.getElementById('mode-date').classList.toggle('active', m === 'date');
            document.getElementById('sci-btns').style.display = (m === 'scientific') ? 'grid' : 'none';
            binView.style.display = (m === 'programmer') ? 'block' : 'none';
            clearCalc(); closeSidebar();
        }

        function inputNum(n) {
            if (current === '0' || shouldReset) { current = n; shouldReset = false; }
            else { current += n; }
            updateUI();
        }

        function setOp(o) {
            if (operator && !shouldReset) calculate();
            previous = current; operator = o; shouldReset = true;
            historyTxt.innerText = `${previous} ${o}`;
        }

        function calculate() {
            if (!operator || shouldReset) return;
            let result, a = parseFloat(previous), b = parseFloat(current);
            switch(operator) {
                case '+': result = a + b; break;
                case '-': result = a - b; break;
                case '*': result = a * b; break;
                case '/': result = a / b; break;
                case '%': result = a % b; break;
            }
            historyTxt.innerText = `${previous} ${operator} ${current} =`;
            current = result.toString(); operator = null; shouldReset = true;
            updateUI();
        }

        function sciOp(fn) {
            let val = parseFloat(current);
            if(fn === 'sin') current = Math.sin(val).toFixed(4);
            if(fn === 'cos') current = Math.cos(val).toFixed(4);
            if(fn === 'tan') current = Math.tan(val).toFixed(4);
            if(fn === 'sqrt') current = Math.sqrt(val).toString();
            updateUI();
        }

        function updateUI() {
            display.innerText = current;
            if (activeMode === 'programmer') {
                binView.innerText = "BIN: " + (parseInt(current) || 0).toString(2);
            }
        }

        function clearCalc() { current = '0'; previous = ''; operator = null; historyTxt.innerText = ''; binView.innerText = ''; updateUI(); }
        function backspace() { current = current.length > 1 ? current.slice(0, -1) : '0'; updateUI(); }
        function toggleNeg() { current = (parseFloat(current) * -1).toString(); updateUI(); }

        function calcDateDiff() {
            let start = new Date(document.getElementById('d1').value), end = new Date(document.getElementById('d2').value);
            if (isNaN(start) || isNaN(end)) return;
            let diff = Math.abs(end - start), days = Math.ceil(diff / 86400000);
            document.getElementById('dateResult').innerText = `Difference: ${days} days`;
        }
        function resetDates() {
            document.getElementById('d1').value = ""; document.getElementById('d2').value = "";
            document.getElementById('dateResult').innerText = "Select two dates";
        }

        document.addEventListener('mousemove', e => {
            document.querySelectorAll('.reveal-btn').forEach(btn => {
                let rect = btn.getBoundingClientRect();
                btn.style.setProperty('--x', (e.clientX - rect.left) + 'px');
                btn.style.setProperty('--y', (e.clientY - rect.top) + 'px');
            });
        });
    </script>
</body>
</html>
